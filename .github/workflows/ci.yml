name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone muskitty-css-tokenizer (path dependency)
        run: git clone https://github.com/muskitty-dev/muskitty-css-tokenizer.git ../muskitty-css-tokenizer
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone muskitty-css-tokenizer (path dependency)
        run: git clone https://github.com/muskitty-dev/muskitty-css-tokenizer.git ../muskitty-css-tokenizer
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --lib

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone muskitty-css-tokenizer (path dependency)
        run: git clone https://github.com/muskitty-dev/muskitty-css-tokenizer.git ../muskitty-css-tokenizer
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone muskitty-css-tokenizer (path dependency)
        run: git clone https://github.com/muskitty-dev/muskitty-css-tokenizer.git ../muskitty-css-tokenizer
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings

  msrv:
    name: MSRV (1.82)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone muskitty-css-tokenizer (path dependency)
        run: git clone https://github.com/muskitty-dev/muskitty-css-tokenizer.git ../muskitty-css-tokenizer
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.82"
      - uses: Swatinem/rust-cache@v2
      - run: cargo check
